name: Update OpenSource Data

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_DATA_TOKEN }}
          GITHUB_USERNAME: adamma1024
        run: node git_data_fetcher.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/shared/opensource/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update opensource data (automated weekly)"
            git push
          fi
